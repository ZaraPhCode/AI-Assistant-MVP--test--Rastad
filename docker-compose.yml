version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rastad
      POSTGRES_PASSWORD: rastadpass
      POSTGRES_DB: rastad_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rastad -d rastad_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://rastad:rastadpass@db:5432/rastad_db
      - LLM_PROVIDER=mock
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: